<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Warriors — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#000;font-family:'Rajdhani',sans-serif;cursor:none;overflow-x:hidden;}
.cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-inner{width:6px;height:6px;background:#ff9a00;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #ff9a00,0 0 20px #ff6600;}
.cursor-outer{width:20px;height:20px;border:1px solid rgba(255,154,0,.5);border-radius:50%;position:absolute;top:0;left:0;animation:cp 2s ease infinite;}
@keyframes cp{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:.2}}
.cursor.cl .cursor-inner{transform:translate(-50%,-50%) scale(2);background:#fff;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#ember-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 20%,rgba(0,0,0,.85) 100%);}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px);}
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 48px;}
.page-header{text-align:center;margin-bottom:28px;opacity:0;transform:translateY(-20px);animation:hIn .8s cubic-bezier(.16,1,.3,1) .1s forwards;}
@keyframes hIn{to{opacity:1;transform:translateY(0)}}
.page-rune{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:6px;color:rgba(255,150,0,.3);margin-bottom:8px;}
.page-title{font-family:'Uncial Antiqua',serif;font-size:clamp(26px,4.5vw,50px);letter-spacing:5px;background:linear-gradient(180deg,#fff8e0 0%,#ffcc44 25%,#ff8800 60%,#cc4400 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(255,120,0,.6));}
.page-rule{height:2px;width:0%;margin:10px auto 0;background:linear-gradient(90deg,transparent,#ff8800,#ffcc00,#ff8800,transparent);box-shadow:0 0 10px #ff6600;animation:ruleX .7s ease .6s forwards;}
@keyframes ruleX{to{width:60%;}}
.table-outer{width:100%;max-width:620px;position:relative;opacity:0;animation:fadeUp .6s ease .5s forwards;margin-bottom:22px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.table-border{position:absolute;inset:-2px;z-index:0;pointer-events:none;}
.table-border svg{width:100%;height:100%;}
.tb-path{stroke-dasharray:2600;stroke-dashoffset:2600;animation:tbDraw 1.4s ease .7s forwards;}
@keyframes tbDraw{to{stroke-dashoffset:0;}}
.table-inner{position:relative;z-index:1;background:linear-gradient(160deg,#120900,#0a0500,#0d0210);overflow:hidden;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table thead tr{background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,100,0,.2);}
.lb-table thead th{padding:13px 16px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,200,100,.35);text-align:left;font-weight:400;}
.lb-table thead th:first-child{text-align:center;width:64px;}
.lb-table thead th:nth-child(3),.lb-table thead th:nth-child(4){text-align:center;width:78px;}
.lb-row{border-bottom:1px solid rgba(255,80,0,.07);opacity:0;transform:translateX(-16px);transition:background .2s;}
.lb-row:hover{background:rgba(80,25,0,.22);}
.lb-row.animate{animation:rowIn .38s ease forwards;}
@keyframes rowIn{to{opacity:1;transform:translateX(0)}}
.lb-row.is-me{background:rgba(100,35,0,.22);border-color:rgba(255,150,0,.25);}
.lb-row.top1{background:linear-gradient(90deg,rgba(80,55,0,.25),rgba(40,25,0,.12),transparent);}
.lb-row.top2{background:linear-gradient(90deg,rgba(50,50,50,.18),rgba(20,20,20,.08),transparent);}
.lb-row.top3{background:linear-gradient(90deg,rgba(60,30,0,.18),rgba(30,15,0,.08),transparent);}
.lb-table td{padding:13px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;color:rgba(255,200,150,.6);vertical-align:middle;}
.lb-rank{text-align:center;font-family:'Uncial Antiqua',serif;font-size:18px;}
.rank-1{font-size:22px;animation:mg1 2s ease-in-out infinite;}
.rank-2{font-size:20px;animation:mg2 2.5s ease-in-out infinite;}
.rank-3{font-size:19px;animation:mg3 3s ease-in-out infinite;}
@keyframes mg1{0%,100%{filter:drop-shadow(0 0 8px #ffd700)}50%{filter:drop-shadow(0 0 22px #ffee44)}}
@keyframes mg2{0%,100%{filter:drop-shadow(0 0 5px #b0b0b0)}50%{filter:drop-shadow(0 0 15px #e0e0e0)}}
@keyframes mg3{0%,100%{filter:drop-shadow(0 0 5px #cd7f32)}50%{filter:drop-shadow(0 0 14px #ff9a44)}}
.rank-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:rgba(255,80,0,.1);border:1px solid rgba(255,80,0,.2);font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,200,100,.4);}
.name-cell{color:rgba(255,220,170,.75);}
.you-tag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;background:rgba(255,150,0,.15);color:#ffcc44;padding:2px 8px;border:1px solid rgba(255,150,0,.3);margin-left:8px;vertical-align:middle;}
.wins-cell{text-align:center;color:#00ff88!important;font-weight:700;font-size:16px;text-shadow:0 0 10px rgba(0,255,100,.4);}
.losses-cell{text-align:center;color:rgba(255,80,80,.5)!important;}
.lb-empty{padding:40px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,200,100,.25);}
.lb-error{color:rgba(255,80,80,.45)!important;}
.lb-loading{padding:40px;text-align:center;}
.load-icon{font-size:32px;display:block;margin-bottom:10px;animation:lspin 1s linear infinite;filter:drop-shadow(0 0 10px rgba(255,120,0,.6));}
@keyframes lspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.load-txt{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,200,100,.3);}
.forge-btn{position:relative;height:50px;min-width:140px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:5px;text-transform:uppercase;overflow:hidden;transition:transform .12s,filter .15s;clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);display:flex;align-items:center;justify-content:center;padding:0 22px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.38);box-shadow:0 0 0 1px rgba(255,255,255,.08);}
.forge-btn:hover{transform:scale(1.04);color:rgba(255,220,150,.7);box-shadow:0 0 0 1px rgba(255,200,100,.2);}
.forge-btn:active{transform:scale(.96);}
.forge-btn::before,.forge-btn::after{content:'';position:absolute;width:8px;height:8px;border-color:rgba(255,255,255,.3);border-style:solid;transition:width .2s,height .2s;}
.forge-btn::before{top:3px;left:3px;border-width:1.5px 0 0 1.5px;}
.forge-btn::after{bottom:3px;right:3px;border-width:0 1.5px 1.5px 0;}
.forge-btn:hover::before,.forge-btn:hover::after{width:14px;height:14px;}
.back-wrap{opacity:0;animation:fadeUp .5s ease 1s forwards;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(10,3,0,.95);border:1px solid rgba(255,100,0,.4);padding:10px 24px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#ffcc88;opacity:0;transition:opacity .3s;pointer-events:none;clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px);}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="cursor" id="cursor"><div class="cursor-outer"></div><div class="cursor-inner"></div></div>
<canvas id="bg-canvas"></canvas><canvas id="ember-canvas"></canvas>
<div class="vignette"></div><div class="scan"></div><div id="toast"></div>
<div class="page">
  <div class="page-header">
    <div class="page-rune">⚔ ᚺᚨᛚᛚ ᚩᚠ ᛚᛖᚷᛖᚾᛞᛋ ⚔</div>
    <div class="page-title">🏆 LEADERBOARD</div>
    <div class="page-rule"></div>
  </div>
  <div class="table-outer">
    <div class="table-border">
      <svg viewBox="0 0 620 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="tbG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff8800"><animate attributeName="stop-color" values="#ff8800;#ffcc00;#ff4400;#ff8800" dur="3s" repeatCount="indefinite"/></stop>
            <stop offset="100%" stop-color="#ff4400"><animate attributeName="stop-color" values="#ff4400;#ff8800;#ffcc00;#ff4400" dur="4s" repeatCount="indefinite"/></stop>
          </linearGradient>
          <filter id="tbGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <path class="tb-path" d="M14,2 L606,2 L618,14 L618,486 L606,498 L14,498 L2,486 L2,14 Z" fill="none" stroke="url(#tbG)" stroke-width="1" filter="url(#tbGlow)" opacity=".7"/>
        <path d="M2,14 L2,2 L14,2" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity=".9"/>
        <path d="M606,2 L618,2 L618,14" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity=".9"/>
        <path d="M618,486 L618,498 L606,498" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity=".9"/>
        <path d="M14,498 L2,498 L2,486" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity=".9"/>
      </svg>
    </div>
    <div class="table-inner">
      <table class="lb-table">
        <thead><tr><th>#</th><th>WARRIOR</th><th>WINS</th><th>LOSSES</th></tr></thead>
        <tbody id="lb-body">
          <tr><td colspan="4"><div class="lb-loading"><span class="load-icon">⚔</span><div class="load-txt">SUMMONING WARRIORS...</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="back-wrap"><button class="forge-btn" onclick="window.history.back()">← &nbsp; BACK</button></div>
</div>
<script src="../shared/eventbus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
var cur=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
document.addEventListener('mousedown',function(){cur.classList.add('cl');});
document.addEventListener('mouseup',function(){cur.classList.remove('cl');});
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function loadLeaderboard(){
  var tbody=document.getElementById('lb-body');
  try{
    var r=await API.getLeaderboard();
    if(!r.ok||!r.data.leaderboard){tbody.innerHTML='<tr><td colspan="4"><div class="lb-empty lb-error">⚠ COULD NOT LOAD LEADERBOARD</div></td></tr>';return;}
    var players=r.data.leaderboard;
    if(!players.length){tbody.innerHTML='<tr><td colspan="4"><div class="lb-empty">NO WARRIORS YET — BE THE FIRST!</div></td></tr>';return;}
    var medals=['🥇','🥈','🥉'],topCls=['top1','top2','top3'],me=State.getUser();
    tbody.innerHTML=players.map(function(u,i){
      var isMe=me&&u.username===me.username;
      var rnk=i<3?'<span class="rank-'+(i+1)+'">'+medals[i]+'</span>':'<span class="rank-num">#'+(i+1)+'</span>';
      var tc=i<3?topCls[i]:'';
      return '<tr class="lb-row '+(isMe?'is-me ':'')+tc+'" style="animation-delay:'+(i*.07+.7)+'s">'+
        '<td class="lb-rank">'+rnk+'</td>'+
        '<td class="name-cell">'+esc(u.username)+(isMe?'<span class="you-tag">YOU</span>':'')+'</td>'+
        '<td class="wins-cell">'+(u.wins||0)+'</td>'+
        '<td class="losses-cell">'+(u.losses||0)+'</td>'+
        '</tr>';
    }).join('');
    setTimeout(function(){document.querySelectorAll('.lb-row').forEach(function(r){r.classList.add('animate');});},50);
  }catch(e){tbody.innerHTML='<tr><td colspan="4"><div class="lb-empty lb-error">⚠ SERVER OFFLINE</div></td></tr>';}
}
(function(){var C=document.getElementById('bg-canvas'),ctx=C.getContext('2d'),W,H,pts=[],t=0;function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}addEventListener('resize',resize);resize();for(var i=0;i<110;i++)pts.push({x:Math.random()*W,y:H+Math.random()*150,r:Math.random()*2.5+.4,vx:(Math.random()-.5)*.4,vy:-(Math.random()*1.2+.3),life:Math.random(),max:Math.random()*.65+.3,hue:Math.random()*25+5});function draw(){ctx.clearRect(0,0,W,H);t++;var bg=ctx.createRadialGradient(W/2,H*.85,0,W/2,H*.4,H*.9);bg.addColorStop(0,'rgba(70,18,0,.28)');bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);pts.forEach(function(p){p.life+=.011;if(p.life>p.max){p.y=H+20;p.x=Math.random()*W;p.life=0;p.max=Math.random()*.65+.3;}var pg=p.life/p.max,a=pg<.2?pg/.2:pg>.7?(1-pg)/.3:1;a*=.72;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1-pg*.5),0,Math.PI*2);ctx.fillStyle='hsla('+(p.hue+pg*15)+','+(85-pg*25)+'%,'+(65-pg*35)+'%,'+a+')';ctx.fill();p.x+=p.vx+Math.sin(t*.02+p.y*.01)*.3;p.y+=p.vy;});requestAnimationFrame(draw);}draw();})();
(function(){var C=document.getElementById('ember-canvas'),ctx=C.getContext('2d'),W,H,em=[];function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}addEventListener('resize',resize);resize();for(var i=0;i<40;i++)em.push({x:Math.random()*W,y:H+Math.random()*H,vx:(Math.random()-.5)*.7,vy:-(Math.random()*1.3+.4),r:Math.random()*2+.4,a:Math.random()*.4+.1,c:Math.random()>.5?'255,120,30':'255,200,60'});function draw(){ctx.clearRect(0,0,W,H);em.forEach(function(e){e.a-=.003;if(e.a<=0){e.x=Math.random()*W;e.y=H+10;e.a=.5+Math.random()*.4;}e.x+=e.vx;e.y+=e.vy;e.vx*=.985;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fillStyle='rgba('+e.c+','+e.a+')';ctx.fill();});requestAnimationFrame(draw);}draw();})();
loadLeaderboard();
</script>
</body>
</html>

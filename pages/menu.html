<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Warriors — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;cursor:none;}

.cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-inner{width:6px;height:6px;background:#ff9a00;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #ff9a00,0 0 20px #ff6600;}
.cursor-outer{width:20px;height:20px;border:1px solid rgba(255,154,0,.5);border-radius:50%;position:absolute;top:0;left:0;animation:cp 2s ease infinite;}
@keyframes cp{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:.2}}
.cursor.cl .cursor-inner{transform:translate(-50%,-50%) scale(2);background:#fff;}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#ember-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 20%,rgba(0,0,0,.85) 100%);}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px);}

.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;gap:0;}

/* HEADER */
.header{text-align:center;margin-bottom:24px;opacity:0;transform:translateY(-24px);animation:hIn .8s cubic-bezier(.16,1,.3,1) .1s forwards;}
@keyframes hIn{to{opacity:1;transform:translateY(0)}}
.welcome-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:8px;color:rgba(255,200,100,.28);margin-bottom:6px;}
.username{
  font-family:'Uncial Antiqua',serif;font-size:clamp(24px,5vw,52px);letter-spacing:4px;
  background:linear-gradient(180deg,#fff8e0 0%,#ffcc44 25%,#ff8800 55%,#cc4400 100%);background-size:100% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,120,0,.6));animation:nameFlow 5s ease infinite;
}
@keyframes nameFlow{0%,100%{background-position:0% 0%}50%{background-position:0% 100%}}

/* STAT RINGS */
.stat-zone{display:flex;gap:24px;margin-bottom:20px;opacity:0;transform:scale(.88);animation:zoneIn .7s cubic-bezier(.34,1.56,.64,1) .3s forwards;}
@keyframes zoneIn{to{opacity:1;transform:scale(1)}}
.stat-ring-wrap{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;}
.stat-ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:3;}
.ring-fill{fill:none;stroke-width:3;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .8s;}
.ring-glow{fill:none;stroke-width:7;stroke-linecap:round;transform-origin:center;transform:rotate(-90deg);stroke-dasharray:283;stroke-dashoffset:283;opacity:.2;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .8s;filter:blur(4px);}
.ring-wins .ring-fill{stroke:url(#gG);}
.ring-wins .ring-glow{stroke:#00ff88;}
.ring-losses .ring-fill{stroke:url(#rG);}
.ring-losses .ring-glow{stroke:#ff4455;}
.ring-inner{position:relative;z-index:1;text-align:center;}
.ring-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:32px;display:block;line-height:1;}
.ring-wins   .ring-num{color:#00ff88;text-shadow:0 0 15px rgba(0,255,136,.6);}
.ring-losses .ring-num{color:#ff4455;text-shadow:0 0 15px rgba(255,44,85,.6);}
.ring-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-top:1px;}

/* WIN RATE */
.wr-zone{width:100%;max-width:260px;margin-bottom:20px;opacity:0;animation:fadeU .5s ease .5s forwards;}
@keyframes fadeU{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wr-head{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,200,100,.3);letter-spacing:3px;margin-bottom:7px;}
.wr-track{position:relative;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;
  clip-path:polygon(3px 0%,calc(100% - 3px) 0%,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0% calc(100% - 3px),0% 3px);}
.wr-fill{height:100%;width:0%;background:linear-gradient(90deg,#cc2200,#ff8800,#ffcc00,#88ff44);box-shadow:0 0 10px rgba(255,150,0,.5);transition:width 1.3s cubic-bezier(.4,0,.2,1) .9s;position:relative;}
.wr-fill::after{content:'';position:absolute;top:0;left:0;height:100%;width:50%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:wrShim 2.5s ease infinite 2s;}
@keyframes wrShim{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}

/* QUOTE */
.quote{
  max-width:300px;text-align:center;margin-bottom:18px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:500;font-style:italic;
  color:rgba(255,200,100,.3);line-height:1.6;
  border-left:2px solid rgba(255,120,0,.3);padding-left:12px;
  opacity:0;animation:fadeU .8s ease .7s forwards;
}

/* BUTTONS */
.btns{display:flex;flex-direction:column;gap:9px;width:100%;max-width:320px;}
.mnu{
  position:relative;height:54px;border:none;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:5px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:10px;
  overflow:hidden;transition:transform .12s,filter .15s;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  opacity:0;transform:translateX(-30px);
}
.mnu:nth-child(1){animation:btnIn .5s ease .55s forwards;}
.mnu:nth-child(2){animation:btnIn .5s ease .65s forwards;}
.mnu:nth-child(4){animation:btnIn .5s ease .75s forwards;}
.mnu:nth-child(5){animation:btnIn .5s ease .85s forwards;}
.mnu:nth-child(6){animation:btnIn .5s ease .95s forwards;}
@keyframes btnIn{to{opacity:1;transform:translateX(0)}}
.mnu:hover{transform:scale(1.03);filter:brightness(1.18);}
.mnu:active{transform:scale(.96);}
.mnu::before,.mnu::after{content:'';position:absolute;width:8px;height:8px;border-color:rgba(255,255,255,.3);border-style:solid;transition:width .2s,height .2s;}
.mnu::before{top:3px;left:3px;border-width:1.5px 0 0 1.5px;}
.mnu::after{bottom:3px;right:3px;border-width:0 1.5px 1.5px 0;}
.mnu:hover::before,.mnu:hover::after{width:14px;height:14px;}

.mnu.battle{
  background:linear-gradient(135deg,#2a0800,#6a1800,#2a0800);background-size:200%;
  color:#ffcc88;height:60px;font-size:13px;letter-spacing:6px;
  box-shadow:0 0 0 1px rgba(200,60,0,.5),0 0 40px rgba(180,40,0,.3),inset 0 1px 0 rgba(255,150,50,.15);
  animation:btnIn .5s ease .55s forwards,bgPulse 4s ease infinite;
}
@keyframes bgPulse{0%,100%{background-position:0%}50%{background-position:100%}}
.mnu.battle:hover{box-shadow:0 0 0 1px rgba(255,150,0,.8),0 0 60px rgba(255,80,0,.5);}
.mnu.battle::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ff8800,#ffcc00,#ff8800,transparent);animation:fireLine 2.5s ease infinite;}
@keyframes fireLine{0%{opacity:0;transform:scaleX(.2)}40%{opacity:1}100%{opacity:0;transform:scaleX(1.3)}}
.mnu.battle .sweep{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,180,50,.2),transparent);animation:swp 3s ease infinite 3s;}
@keyframes swp{0%{left:-100%}50%,100%{left:150%}}

.mnu.gold{background:transparent;color:#ffcc66;box-shadow:0 0 0 1px rgba(200,150,0,.3);}
.mnu.gold:hover{box-shadow:0 0 0 1px rgba(255,200,50,.6),0 0 20px rgba(200,100,0,.2);}
.mnu.ghost{background:rgba(255,255,255,.03);color:rgba(255,255,255,.38);box-shadow:0 0 0 1px rgba(255,255,255,.09);}
.mnu.ghost:hover{color:rgba(255,220,150,.8);box-shadow:0 0 0 1px rgba(255,200,100,.2);}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,150,50,.15),transparent);margin:2px 0;opacity:0;animation:fadeU .5s ease .7s forwards;}
.coin{background:rgba(200,130,0,.15);color:#ffcc44;font-size:10px;padding:2px 10px;border-radius:2px;font-family:'Share Tech Mono',monospace;border:1px solid rgba(200,130,0,.3);letter-spacing:1px;}

.svg-defs{position:absolute;width:0;height:0;}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;
  background:rgba(10,3,0,.95);border:1px solid rgba(255,100,0,.4);padding:10px 24px;
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#ffcc88;
  opacity:0;transition:opacity .3s;pointer-events:none;
  clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="cursor" id="cursor"><div class="cursor-outer"></div><div class="cursor-inner"></div></div>

<svg class="svg-defs">
  <defs>
    <linearGradient id="gG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00aa55"/><stop offset="100%" stop-color="#00ff88"/></linearGradient>
    <linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#aa0022"/><stop offset="100%" stop-color="#ff4455"/></linearGradient>
  </defs>
</svg>

<canvas id="bg-canvas"></canvas>
<canvas id="ember-canvas"></canvas>
<div class="vignette"></div>
<div class="scan"></div>
<div id="toast"></div>

<div class="stage">

  <div class="header">
    <div class="welcome-lbl">⚔ WELCOME BACK, WARRIOR ⚔</div>
    <div class="username" id="menu-username">WARRIOR</div>
  </div>

  <div class="stat-zone">
    <div class="stat-ring-wrap ring-wins">
      <svg viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="45"/>
        <circle class="ring-glow" id="ring-w-glow" cx="50" cy="50" r="45"/>
        <circle class="ring-fill" id="ring-w-fill" cx="50" cy="50" r="45"/>
      </svg>
      <div class="ring-inner">
        <span class="ring-num" id="stat-wins">0</span>
        <div class="ring-lbl">WINS</div>
      </div>
    </div>
    <div class="stat-ring-wrap ring-losses">
      <svg viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="45"/>
        <circle class="ring-glow" id="ring-l-glow" cx="50" cy="50" r="45"/>
        <circle class="ring-fill" id="ring-l-fill" cx="50" cy="50" r="45"/>
      </svg>
      <div class="ring-inner">
        <span class="ring-num" id="stat-losses">0</span>
        <div class="ring-lbl">LOSSES</div>
      </div>
    </div>
  </div>

  <div class="wr-zone">
    <div class="wr-head"><span>WIN RATE</span><span id="wr-pct">—</span></div>
    <div class="wr-track"><div class="wr-fill" id="wr-fill"></div></div>
  </div>

  <div class="quote" id="quote-mini"></div>

  <div class="btns">
    <button class="mnu battle" onclick="window.location.href='warrior-select.html'">
      <div class="sweep"></div>
      <span style="position:relative;z-index:1">⚔ &nbsp; NEW BATTLE</span>
    </button>
    <button class="mnu gold" onclick="window.location.href='leaderboard.html'">
      <span style="position:relative;z-index:1">🏆 &nbsp; LEADERBOARD</span>
    </button>
    <div class="divider"></div>
    <button class="mnu ghost" onclick="window.location.href='howto.html'">
      <span style="position:relative;z-index:1">📖 &nbsp; HOW TO PLAY</span>
    </button>
    <button class="mnu ghost" onclick="window.location.href='shop.html'">
      <span style="position:relative;z-index:1">🏪 &nbsp; POWER-UP SHOP</span>
      <span class="coin" id="menu-coin-badge">🪙 0</span>
    </button>
    <button class="mnu ghost" onclick="Auth.logout()">
      <span style="position:relative;z-index:1">↩ &nbsp; LOGOUT</span>
    </button>
  </div>

</div>

<script src="../shared/eventbus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
if(!State.isLoggedIn()) window.location.href='auth.html';

var cur=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
document.addEventListener('mousedown',function(){cur.classList.add('cl');});
document.addEventListener('mouseup',function(){cur.classList.remove('cl');});

var QUOTES=[
  '"The puzzle is the battlefield. Your mind is the weapon."',
  '"Every correct answer is a blade drawn."',
  '"Sharpen your mind. Crush your enemies."',
  '"Victory belongs to those who think fastest."',
  '"The forge never rests. Neither should you."',
  '"Knowledge is the deadliest weapon in the arena."',
  '"Doubt is the only enemy you cannot defeat."',
];

function setRing(id,pct){
  var off=283*(1-pct/100);
  document.getElementById('ring-'+id+'-fill').style.strokeDashoffset=off;
  document.getElementById('ring-'+id+'-glow').style.strokeDashoffset=off;
}

function countUp(el,target){
  var cur=0,steps=55,inc=target/steps;
  var iv=setInterval(function(){cur=Math.min(cur+inc,target);el.textContent=Math.floor(cur);if(cur>=target)clearInterval(iv);},22);
}

function updateStats(user){
  var w=user.wins||0, l=user.losses||0, tot=w+l;
  document.getElementById('menu-username').textContent=(user.username||'WARRIOR').toUpperCase();
  countUp(document.getElementById('stat-wins'),w);
  countUp(document.getElementById('stat-losses'),l);
  if(tot>0){
    var mx=Math.max(w,l)||1;
    setRing('w',Math.round(w/mx*100));
    setRing('l',Math.round(l/mx*100));
    var pct=Math.round(w/tot*100);
    document.getElementById('wr-pct').textContent=pct+'%';
    document.getElementById('wr-fill').style.width=pct+'%';
  }
}

async function loadMenu(){
  var user=State.getUser(); if(!user)return;
  document.getElementById('menu-coin-badge').textContent='🪙 '+(parseInt(localStorage.getItem('pw_coins')||'0',10));

  /* Show quote */
  var q=document.getElementById('quote-mini');
  q.textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];

  setTimeout(function(){updateStats(user);},420);

  try{
    var r=await API.getMe();
    if(r.ok&&r.data.user){State.setUser(r.data.user);updateStats(r.data.user);}
  }catch(e){}
}

/* fire bg */
(function(){
  var C=document.getElementById('bg-canvas'),ctx=C.getContext('2d'),W,H,pts=[],t=0;
  function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
  addEventListener('resize',resize);resize();
  for(var i=0;i<120;i++) pts.push({x:Math.random()*W,y:H+Math.random()*150,r:Math.random()*2.5+.4,vx:(Math.random()-.5)*.4,vy:-(Math.random()*1.3+.3),life:Math.random(),max:Math.random()*.65+.3,hue:Math.random()*25+5});
  function draw(){
    ctx.clearRect(0,0,W,H);t++;
    var bg=ctx.createRadialGradient(W/2,H,0,W/2,H*.5,H);
    bg.addColorStop(0,'rgba(70,18,0,.3)');bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    pts.forEach(function(p){
      p.life+=.011;if(p.life>p.max){p.y=H+20;p.x=Math.random()*W;p.life=0;p.max=Math.random()*.65+.3;}
      var pg=p.life/p.max,a=pg<.2?pg/.2:pg>.7?(1-pg)/.3:1;a*=.75;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1-pg*.5),0,Math.PI*2);
      ctx.fillStyle='hsla('+(p.hue+pg*15)+','+(85-pg*25)+'%,'+(65-pg*35)+'%,'+a+')';ctx.fill();
      p.x+=p.vx+Math.sin(t*.02+p.y*.01)*.3;p.y+=p.vy;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
/* embers */
(function(){
  var C=document.getElementById('ember-canvas'),ctx=C.getContext('2d'),W,H,em=[];
  function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
  addEventListener('resize',resize);resize();
  for(var i=0;i<50;i++) em.push({x:Math.random()*W,y:H+Math.random()*H,vx:(Math.random()-.5)*.8,vy:-(Math.random()*1.4+.4),r:Math.random()*2+.4,a:Math.random()*.5+.1,c:Math.random()>.5?'255,120,30':'255,200,60'});
  var mx=-1,my=-1;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
  function draw(){
    ctx.clearRect(0,0,W,H);
    em.forEach(function(e){
      e.a-=.003;if(e.a<=0){e.x=Math.random()*W;e.y=H+10;e.a=.5+Math.random()*.4;}
      if(mx>=0){var dx=e.x-mx,dy=e.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<100){e.vx+=dx/d*.06;e.vy+=dy/d*.02;}}
      e.x+=e.vx;e.y+=e.vy;e.vx*=.98;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+e.c+','+e.a+')';ctx.fill();
      if(e.r>1&&e.a>.25){ctx.beginPath();ctx.moveTo(e.x-e.r*3,e.y);ctx.lineTo(e.x+e.r*3,e.y);ctx.moveTo(e.x,e.y-e.r*3);ctx.lineTo(e.x,e.y+e.r*3);ctx.strokeStyle='rgba('+e.c+','+e.a*.4+')';ctx.lineWidth=.5;ctx.stroke();}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

loadMenu();
</script>
</body>
</html>

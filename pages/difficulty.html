<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Warriors — Difficulty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'Rajdhani',sans-serif;cursor:none;overflow:hidden;}
.cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-inner{width:6px;height:6px;background:#ff9a00;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #ff9a00,0 0 20px #ff6600;}
.cursor-outer{width:20px;height:20px;border:1px solid rgba(255,154,0,.5);border-radius:50%;position:absolute;top:0;left:0;animation:cp 2s ease infinite;}
@keyframes cp{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:.2}}
.cursor.cl .cursor-inner{transform:translate(-50%,-50%) scale(2);background:#fff;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#ember-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 20%,rgba(0,0,0,.88) 100%);}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px);}

.page{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;}

/* HEADER */
.page-header{text-align:center;margin-bottom:36px;opacity:0;transform:translateY(-20px);animation:hIn .8s cubic-bezier(.16,1,.3,1) .1s forwards;}
@keyframes hIn{to{opacity:1;transform:translateY(0)}}
.page-rune{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:6px;color:rgba(255,150,0,.3);margin-bottom:8px;}
.page-title{font-family:'Uncial Antiqua',serif;font-size:clamp(22px,4vw,46px);letter-spacing:5px;
  background:linear-gradient(180deg,#fff8e0 0%,#ffcc44 25%,#ff8800 60%,#cc4400 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(255,120,0,.6));}
.page-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:5px;color:rgba(255,200,100,.28);margin-top:6px;}
.page-rule{height:2px;width:0%;margin:10px auto 0;background:linear-gradient(90deg,transparent,#ff8800,#ffcc00,#ff8800,transparent);box-shadow:0 0 10px #ff6600;animation:ruleX .7s ease .6s forwards;}
@keyframes ruleX{to{width:55%;}}

/* DIFF GRID */
.diff-grid{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;}

.diff-card{
  position:relative;width:200px;
  background:linear-gradient(165deg,#130a00,#0a0500,#0e0312);
  border:1px solid rgba(255,100,0,.2);
  padding:32px 20px 26px;text-align:center;overflow:hidden;
  clip-path:polygon(12px 0%,calc(100% - 12px) 0%,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0% calc(100% - 12px),0% 12px);
  cursor:pointer;
  opacity:0;transform:translateY(28px) scale(.9);
  transition:transform .2s,border-color .2s,box-shadow .2s;
}
.diff-card:nth-child(1){animation:cardIn .5s ease .4s forwards;}
.diff-card:nth-child(2){animation:cardIn .5s ease .56s forwards;}
.diff-card:nth-child(3){animation:cardIn .5s ease .72s forwards;}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1)}}

/* Top accent — per difficulty */
.diff-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.5;transition:opacity .2s;}
.diff-card.easy::before  {background:linear-gradient(90deg,transparent,#44ff88,transparent);}
.diff-card.normal::before{background:linear-gradient(90deg,transparent,#ff9900,transparent);}
.diff-card.hard::before  {background:linear-gradient(90deg,transparent,#ff2222,transparent);}
.diff-card:hover::before{opacity:1;}

/* Bottom corner tick */
.diff-card::after{content:'';position:absolute;bottom:5px;right:5px;width:10px;height:10px;border-bottom:1px solid rgba(255,150,50,.2);border-right:1px solid rgba(255,150,50,.2);transition:width .2s,height .2s;}
.diff-card:hover::after{width:16px;height:16px;}

/* HOVER */
.diff-card:hover{transform:translateY(-8px) scale(1.04)!important;box-shadow:0 0 40px rgba(150,50,0,.3),0 20px 45px rgba(0,0,0,.5);}
.diff-card.easy:hover  {border-color:rgba(80,255,150,.45);}
.diff-card.normal:hover{border-color:rgba(255,150,0,.55);}
.diff-card.hard:hover  {border-color:rgba(255,50,50,.55);}

/* SELECTED */
.diff-card.selected{transform:scale(1.06)!important;}
.diff-card.easy.selected  {border-color:rgba(80,255,150,.7);box-shadow:0 0 50px rgba(0,200,80,.25);}
.diff-card.normal.selected{border-color:rgba(255,150,0,.8);box-shadow:0 0 50px rgba(255,120,0,.3);}
.diff-card.hard.selected  {border-color:rgba(255,60,60,.8);box-shadow:0 0 50px rgba(255,30,30,.3);}

.diff-icon{font-size:52px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 12px rgba(255,100,0,.5));animation:iconFloat 3s ease-in-out infinite;}
.diff-card:nth-child(1) .diff-icon{animation-delay:0s;}
.diff-card:nth-child(2) .diff-icon{animation-delay:.9s;}
.diff-card:nth-child(3) .diff-icon{animation-delay:1.8s;}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

.diff-name{font-family:'Uncial Antiqua',serif;font-size:18px;letter-spacing:3px;margin-bottom:10px;}
.diff-card.easy   .diff-name{color:#44ff88;text-shadow:0 0 12px rgba(0,255,100,.4);}
.diff-card.normal .diff-name{color:#ff9900;text-shadow:0 0 12px rgba(255,150,0,.4);}
.diff-card.hard   .diff-name{color:#ff4444;text-shadow:0 0 12px rgba(255,50,50,.5);}

.diff-timer{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;margin-bottom:6px;}
.diff-card.easy   .diff-timer{color:rgba(80,255,150,.5);}
.diff-card.normal .diff-timer{color:rgba(255,180,50,.5);}
.diff-card.hard   .diff-timer{color:rgba(255,80,80,.5);}

.diff-desc{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;color:rgba(255,200,150,.35);line-height:1.5;transition:color .2s;}
.diff-card:hover .diff-desc{color:rgba(255,220,170,.6);}

/* Stat pills */
.diff-pills{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.pill{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
.pill-g{background:rgba(0,200,80,.1);color:rgba(80,255,150,.5);border:1px solid rgba(0,200,80,.2);}
.pill-y{background:rgba(200,120,0,.1);color:rgba(255,180,50,.5);border:1px solid rgba(200,120,0,.2);}
.pill-r{background:rgba(200,30,30,.1);color:rgba(255,80,80,.5);border:1px solid rgba(200,30,30,.2);}

/* BACK */
.back-wrap{opacity:0;animation:fadeU .5s ease .85s forwards;}
@keyframes fadeU{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.forge-btn{position:relative;height:50px;min-width:140px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:5px;text-transform:uppercase;overflow:hidden;transition:transform .12s,filter .15s;clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);display:flex;align-items:center;justify-content:center;padding:0 22px;background:rgba(255,255,255,.03);color:rgba(255,255,255,.38);box-shadow:0 0 0 1px rgba(255,255,255,.08);}
.forge-btn:hover{transform:scale(1.04);color:rgba(255,220,150,.7);box-shadow:0 0 0 1px rgba(255,200,100,.2);}
.forge-btn:active{transform:scale(.96);}
.forge-btn::before,.forge-btn::after{content:'';position:absolute;width:8px;height:8px;border-color:rgba(255,255,255,.3);border-style:solid;transition:width .2s,height .2s;}
.forge-btn::before{top:3px;left:3px;border-width:1.5px 0 0 1.5px;}
.forge-btn::after{bottom:3px;right:3px;border-width:0 1.5px 1.5px 0;}
.forge-btn:hover::before,.forge-btn:hover::after{width:14px;height:14px;}

/* BURST */
.burst-p{position:fixed;border-radius:50%;pointer-events:none;z-index:999;animation:bOut .6s ease-out forwards;}
@keyframes bOut{to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(10,3,0,.95);border:1px solid rgba(255,100,0,.4);padding:10px 24px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#ffcc88;opacity:0;transition:opacity .3s;pointer-events:none;clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px);}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="cursor" id="cursor"><div class="cursor-outer"></div><div class="cursor-inner"></div></div>
<canvas id="bg-canvas"></canvas><canvas id="ember-canvas"></canvas>
<div class="vignette"></div><div class="scan"></div><div id="toast"></div>

<div class="page">
  <div class="page-header">
    <div class="page-rune">⚔ ᚲᚺᚩᚩᛋᛖ ᚤᚩᚢᚱ ᛏᚱᛁᚨᛚ ⚔</div>
    <div class="page-title" id="page-title">Select Difficulty</div>
    <div class="page-sub">THE FORGE TESTS ALL WHO ENTER</div>
    <div class="page-rule"></div>
  </div>

  <div class="diff-grid">
    <div class="diff-card easy" onclick="chooseDifficulty('easy',this)">
      <span class="diff-icon">🌿</span>
      <div class="diff-name">EASY</div>
      <div class="diff-timer">⏱ 30 SECONDS</div>
      <div class="diff-desc">Simple patterns<br>Forgiving pace</div>
      <div class="diff-pills"><span class="pill pill-g">BEGINNER</span><span class="pill pill-g">RELAXED</span></div>
    </div>
    <div class="diff-card normal" onclick="chooseDifficulty('normal',this)">
      <span class="diff-icon">⚔️</span>
      <div class="diff-name">NORMAL</div>
      <div class="diff-timer">⏱ 20 SECONDS</div>
      <div class="diff-desc">Mixed patterns<br>Steady pressure</div>
      <div class="diff-pills"><span class="pill pill-y">WARRIOR</span><span class="pill pill-y">BALANCED</span></div>
    </div>
    <div class="diff-card hard" onclick="chooseDifficulty('hard',this)">
      <span class="diff-icon">💀</span>
      <div class="diff-name">HARD</div>
      <div class="diff-timer">⏱ 10 SECONDS</div>
      <div class="diff-desc">Brutal patterns<br>No mercy</div>
      <div class="diff-pills"><span class="pill pill-r">LEGEND</span><span class="pill pill-r">PUNISHING</span></div>
    </div>
  </div>

  <div class="back-wrap">
    <button class="forge-btn" onclick="window.location.href='warrior-select.html'">← &nbsp; BACK</button>
  </div>
</div>

<script src="../shared/eventbus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
if(!State.isLoggedIn()) window.location.href='auth.html';

var cur=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
document.addEventListener('mousedown',function(){cur.classList.add('cl');});
document.addEventListener('mouseup',function(){cur.classList.remove('cl');});

/* Daily challenge label */
(function(){
  var isDaily=sessionStorage.getItem('pw_daily_run');
  if(isDaily) document.getElementById('page-title').textContent='🏅 Daily Challenge';
})();

function burst(card){
  var rect=card.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  var cols=['#ffcc00','#ff8800','#ff4400','#ffee88','#ffffff'];
  for(var i=0;i<18;i++){
    var p=document.createElement('div');p.className='burst-p';
    var ang=Math.random()*Math.PI*2,dist=40+Math.random()*65,sz=Math.random()*6+2;
    p.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';top:'+cy+'px;left:'+cx+'px;--tx:'+(Math.cos(ang)*dist)+'px;--ty:'+(Math.sin(ang)*dist)+'px;box-shadow:0 0 6px currentColor;';
    document.body.appendChild(p);
    setTimeout(function(el){document.body.removeChild(el);},650,p);
  }
}

function chooseDifficulty(d,card){
  document.querySelectorAll('.diff-card').forEach(function(c){c.classList.remove('selected');});
  card.classList.add('selected');
  burst(card);
  EventBus.emit('sfx:play',{name:'click'});
  sessionStorage.setItem('pw_difficulty',d);
  setTimeout(function(){window.location.href='shop.html';},420);
}

/* fire bg */
(function(){var C=document.getElementById('bg-canvas'),ctx=C.getContext('2d'),W,H,pts=[],t=0;function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}addEventListener('resize',resize);resize();for(var i=0;i<110;i++)pts.push({x:Math.random()*W,y:H+Math.random()*150,r:Math.random()*2.5+.4,vx:(Math.random()-.5)*.4,vy:-(Math.random()*1.2+.3),life:Math.random(),max:Math.random()*.65+.3,hue:Math.random()*25+5});function draw(){ctx.clearRect(0,0,W,H);t++;var bg=ctx.createRadialGradient(W/2,H*.85,0,W/2,H*.4,H*.9);bg.addColorStop(0,'rgba(70,18,0,.28)');bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);pts.forEach(function(p){p.life+=.011;if(p.life>p.max){p.y=H+20;p.x=Math.random()*W;p.life=0;p.max=Math.random()*.65+.3;}var pg=p.life/p.max,a=pg<.2?pg/.2:pg>.7?(1-pg)/.3:1;a*=.72;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1-pg*.5),0,Math.PI*2);ctx.fillStyle='hsla('+(p.hue+pg*15)+','+(85-pg*25)+'%,'+(65-pg*35)+'%,'+a+')';ctx.fill();p.x+=p.vx+Math.sin(t*.02+p.y*.01)*.3;p.y+=p.vy;});requestAnimationFrame(draw);}draw();})();
(function(){var C=document.getElementById('ember-canvas'),ctx=C.getContext('2d'),W,H,em=[];function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}addEventListener('resize',resize);resize();for(var i=0;i<40;i++)em.push({x:Math.random()*W,y:H+Math.random()*H,vx:(Math.random()-.5)*.7,vy:-(Math.random()*1.3+.4),r:Math.random()*2+.4,a:Math.random()*.4+.1,c:Math.random()>.5?'255,120,30':'255,200,60'});var mx=-1,my=-1;document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});function draw(){ctx.clearRect(0,0,W,H);em.forEach(function(e){e.a-=.003;if(e.a<=0){e.x=Math.random()*W;e.y=H+10;e.a=.5+Math.random()*.4;}if(mx>=0){var dx=e.x-mx,dy=e.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<100){e.vx+=dx/d*.06;e.vy+=dy/d*.02;}}e.x+=e.vx;e.y+=e.vy;e.vx*=.985;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fillStyle='rgba('+e.c+','+e.a+')';ctx.fill();});requestAnimationFrame(draw);}draw();})();
</script>
</body>
</html>

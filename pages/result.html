<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Warriors — Result</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .grade-badge {
      font-family:'Orbitron',monospace;font-size:64px;font-weight:900;
      line-height:1;filter:drop-shadow(0 0 20px currentColor);
    }
    .grade-S { color:#ffd700; }
    .grade-A { color:var(--green); }
    .grade-B { color:var(--neon); }
    .grade-C { color:var(--gold); }
    .grade-D { color:var(--fire); }

    .accuracy-bar-wrap {
      width:260px;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin:0 auto 6px;
    }
    .accuracy-bar {
      height:100%;border-radius:4px;
      background:linear-gradient(90deg,var(--neon),var(--green));
      transition:width 1.2s cubic-bezier(.16,1,.3,1);
    }
    .accuracy-label {
      font-family:'Orbitron',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;text-align:center;
    }

    /* Coins earned card */
    .coins-earned-card {
      display:flex;align-items:center;justify-content:center;gap:16px;
      background:rgba(255,184,0,.07);border:1px solid rgba(255,184,0,.3);
      border-radius:14px;padding:18px 32px;
      font-family:'Orbitron',monospace;
    }
    .coins-earned-big {
      font-size:36px;font-weight:900;color:var(--gold);
      filter:drop-shadow(0 0 12px rgba(255,184,0,.5));
    }
    .coins-earned-label { font-size:9px;color:var(--muted2);letter-spacing:2px; }
    .coins-total-label  { font-size:11px;color:var(--muted2);letter-spacing:1px;margin-top:4px; }
    .coins-total-num    { color:var(--gold);font-weight:700; }

    @keyframes coinSpin {
      0%   { transform:rotateY(0deg) scale(1); }
      50%  { transform:rotateY(180deg) scale(1.2); }
      100% { transform:rotateY(360deg) scale(1); }
    }
    .coin-spin { display:inline-block;font-size:40px;animation:coinSpin 1s ease .3s; }

    .stat-extra { color:var(--neon2) !important; }
  </style>
</head>
<body>
<div class="scanline-wrap"></div>
<div class="particles" id="stars"></div>
<div class="toast" id="toast"></div>

<div class="screen active" id="screen-result">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title" id="result-title">VICTORY!</div>
  <div class="result-subtitle" id="result-subtitle">ENEMY DEFEATED</div>

  <!-- Grade -->
  <div class="grade-badge" id="grade-badge">S</div>
  <div class="accuracy-bar-wrap">
    <div class="accuracy-bar" id="accuracy-bar" style="width:0%"></div>
  </div>
  <div class="accuracy-label" id="accuracy-label">ACCURACY: 0%</div>

  <!-- Stats -->
  <div class="result-stats">
    <div class="result-stat-card">
      <span class="result-stat-num" id="result-correct">0</span>
      <div class="result-stat-label">CORRECT</div>
    </div>
    <div class="result-stat-card">
      <span class="result-stat-num" id="result-wrong">0</span>
      <div class="result-stat-label">WRONG</div>
    </div>
    <div class="result-stat-card">
      <span class="result-stat-num" id="result-hp-left">0</span>
      <div class="result-stat-label">HP LEFT</div>
    </div>
    <div class="result-stat-card">
      <span class="result-stat-num stat-extra" id="result-combo">0</span>
      <div class="result-stat-label">MAX COMBO</div>
    </div>
    <div class="result-stat-card">
      <span class="result-stat-num stat-extra" id="result-time">0s</span>
      <div class="result-stat-label">DURATION</div>
    </div>
  </div>

  <!-- Coins earned -->
  <div class="coins-earned-card">
    <span class="coin-spin">🪙</span>
    <div>
      <div class="coins-earned-big">+<span id="coins-earned-num">0</span></div>
      <div class="coins-earned-label">COINS EARNED</div>
      <div class="coins-total-label">Total balance: <span class="coins-total-num" id="coins-total-num">0</span> 🪙</div>
    </div>
  </div>

  <div class="result-btns">
    <button class="btn btn-primary"   onclick="window.location.href='shop.html'">🏪 VISIT SHOP</button>
    <button class="btn btn-secondary" onclick="window.location.href='difficulty.html'">⚔ PLAY AGAIN</button>
    <button class="btn btn-ghost"     onclick="window.location.href='menu.html'">🏠 MAIN MENU</button>
  </div>
</div>

<script src="../shared/eventBus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
  if (!State.isLoggedIn()) window.location.href = 'auth.html';

  var resultData = null;
  try { resultData = JSON.parse(sessionStorage.getItem('pw_result')); } catch(e) {}
  if (!resultData) window.location.href = 'menu.html';

  var won   = resultData.won;
  var stats = resultData.stats;

  // Background
  document.getElementById('screen-result').className = 'screen active ' + (won ? 'win-bg' : 'lose-bg');

  // Icon + title
  document.getElementById('result-icon').textContent    = won ? '🏆' : '💀';
  var title = document.getElementById('result-title');
  title.textContent = won ? 'VICTORY!' : 'DEFEAT...';
  title.className   = 'result-title ' + (won ? 'result-win' : 'result-lose');
  document.getElementById('result-subtitle').textContent = won ? 'ENEMY DEFEATED!' : 'YOU FELL IN BATTLE';

  // Stats
  document.getElementById('result-correct').textContent = stats.correct  || 0;
  document.getElementById('result-wrong').textContent   = stats.wrong    || 0;
  document.getElementById('result-hp-left').textContent = stats.playerHP >= 0 ? stats.playerHP : 0;
  document.getElementById('result-combo').textContent   = stats.maxCombo || 0;
  document.getElementById('result-time').textContent    = (stats.duration || 0) + 's';

  // Grade + accuracy
  var total    = (stats.correct || 0) + (stats.wrong || 0);
  var accuracy = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
  var grade    = accuracy >= 95 ? 'S' : accuracy >= 80 ? 'A' : accuracy >= 65 ? 'B' : accuracy >= 50 ? 'C' : 'D';
  var gradeEl  = document.getElementById('grade-badge');
  gradeEl.textContent = grade;
  gradeEl.className   = 'grade-badge grade-' + grade;
  document.getElementById('accuracy-label').textContent = 'ACCURACY: ' + accuracy + '%';
  setTimeout(function() {
    document.getElementById('accuracy-bar').style.width = accuracy + '%';
  }, 300);

  // Coins
  document.getElementById('coins-earned-num').textContent = stats.coinsEarned || 0;
  document.getElementById('coins-total-num').textContent  = stats.totalCoins  || State.getCoins();

  // Sound
  setTimeout(function() {
    EventBus.emit('sfx:play', { name: won ? 'victory' : 'defeat' });
  }, 200);

  sessionStorage.removeItem('pw_result');
</script>
</body>
</html>

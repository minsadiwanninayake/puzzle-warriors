<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Warriors — Difficulty</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
<div class="scanline-wrap"></div>
<div class="particles" id="stars"></div>
<div class="toast" id="toast"></div>

<div class="screen active" id="screen-difficulty">
  <div class="screen-title">SELECT DIFFICULTY</div>
  <div class="diff-cards">

    <div class="diff-card easy" onclick="chooseDifficulty('easy')">
      <span class="diff-icon">🌿</span>
      <div class="diff-name">EASY</div>
      <div class="diff-desc">30s timer<br>Simple puzzles</div>
    </div>

    <div class="diff-card normal" onclick="chooseDifficulty('normal')">
      <span class="diff-icon">⚔️</span>
      <div class="diff-name">NORMAL</div>
      <div class="diff-desc">20s timer<br>Mixed puzzles</div>
    </div>

    <div class="diff-card hard" onclick="chooseDifficulty('hard')">
      <span class="diff-icon">💀</span>
      <div class="diff-name">HARD</div>
      <div class="diff-desc">10s timer<br>Tough puzzles</div>
    </div>

  </div>
  <button class="btn btn-ghost" onclick="window.location.href='warrior-select.html'">← BACK</button>
</div>

<script src="../shared/eventBus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
  // Auth guard
  if (!State.isLoggedIn()) {
    window.location.href = 'auth.html';
  }

  function chooseDifficulty(difficulty) {
    EventBus.emit('sfx:play', { name: 'click' });
    sessionStorage.setItem('pw_difficulty', difficulty);
    window.location.href = "shop.html";
  }

  // Show daily challenge indicator if coming from daily button
  (function() {
    var isDaily = sessionStorage.getItem('pw_daily_run');
    if (isDaily) {
      var title = document.querySelector('.screen-title');
      if (title) title.textContent = '🏅 DAILY CHALLENGE — SELECT DIFFICULTY';
    }
  })();
</script>
</body>
</html>

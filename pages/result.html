<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Warriors — Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Rajdhani:wght@300;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:#000;font-family:'Rajdhani',sans-serif;cursor:none;overflow-x:hidden;}

/* ── CURSOR ── */
.cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-inner{width:6px;height:6px;background:#ff9a00;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #ff9a00,0 0 20px #ff6600;}
.cursor-outer{width:20px;height:20px;border:1px solid rgba(255,154,0,.5);border-radius:50%;position:absolute;top:0;left:0;animation:cp 2s ease infinite;}
@keyframes cp{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.4);opacity:.2}}
.cursor.cl .cursor-inner{transform:translate(-50%,-50%) scale(2);background:#fff;}

/* ── CANVASES ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#fx-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 20%,rgba(0,0,0,.88) 100%);}
.scan{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px);}

/* ── PAGE ── */
.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px 48px;gap:0;}

/* ══════════════════════════════════════════
   CINEMATIC RESULT HEADER
══════════════════════════════════════════ */

/* Big result icon */
.result-icon{
  font-size:90px;margin-bottom:10px;
  opacity:0;transform:scale(.1) rotate(-20deg);
  animation:iconCrash .8s cubic-bezier(.34,1.56,.64,1) .2s forwards;
  position:relative;z-index:1;
}
@keyframes iconCrash{to{opacity:1;transform:scale(1) rotate(0deg);}}

/* VICTORY / DEFEAT title */
.result-title{
  font-family:'Uncial Antiqua',serif;
  font-size:clamp(42px,8vw,100px);
  letter-spacing:8px;
  line-height:1;
  display:block;
  opacity:0;
  animation:titleReveal .7s cubic-bezier(.16,1,.3,1) .6s forwards;
}
@keyframes titleReveal{from{opacity:0;transform:scaleX(1.4) scaleY(.5)}to{opacity:1;transform:scale(1)}}

.title-win{
  background:linear-gradient(180deg,#fff8d0 0%,#ffdd44 25%,#ff9900 55%,#cc4400 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,180,0,.7));
  animation:titleReveal .7s cubic-bezier(.16,1,.3,1) .6s forwards, goldPulse 3s ease-in-out infinite 1.3s;
}
@keyframes goldPulse{0%,100%{filter:drop-shadow(0 0 30px rgba(255,180,0,.7))}50%{filter:drop-shadow(0 0 60px rgba(255,220,0,1))}}

.title-lose{
  background:linear-gradient(180deg,#ff8888 0%,#cc2222 40%,#660000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(200,0,0,.7));
  animation:titleReveal .7s cubic-bezier(.16,1,.3,1) .6s forwards, losePulse 3s ease-in-out infinite 1.3s;
}
@keyframes losePulse{0%,100%{filter:drop-shadow(0 0 30px rgba(200,0,0,.7))}50%{filter:drop-shadow(0 0 60px rgba(255,50,50,.8))}}

.result-subtitle{
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:8px;
  color:rgba(255,255,255,.3);margin-bottom:24px;
  opacity:0;animation:fadeUp .5s ease .9s forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── HORIZONTAL RULE ── */
.result-rule{
  width:0%;height:2px;margin:0 auto 22px;
  background:linear-gradient(90deg,transparent,#ff8800,#ffcc00,#ff8800,transparent);
  box-shadow:0 0 12px #ff6600;border-radius:1px;
  animation:ruleX .7s ease 1s forwards;
}
@keyframes ruleX{to{width:70%;}}

/* ══════════════════════════════════════════
   GRADE BADGE
══════════════════════════════════════════ */
.grade-wrap{
  position:relative;display:flex;flex-direction:column;align-items:center;
  margin-bottom:20px;
  opacity:0;transform:scale(.3);
  animation:gradeIn 1s cubic-bezier(.34,1.56,.64,1) 1.1s forwards;
}
@keyframes gradeIn{to{opacity:1;transform:scale(1);}}

.grade-ring{
  position:absolute;width:110px;height:110px;border-radius:50%;border:1px solid;
  animation:gradeRingPulse 2.5s ease-out infinite 2s;
}
.grade-ring:nth-child(1){border-color:rgba(255,180,0,.4);}
.grade-ring:nth-child(2){border-color:rgba(255,100,0,.25);animation-delay:2.8s;}
@keyframes gradeRingPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.2);opacity:0;}}

.grade-badge{
  font-family:'Uncial Antiqua',serif;
  font-size:72px;line-height:1;
  position:relative;z-index:1;
}
.grade-S{color:#ffd700;filter:drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 40px rgba(255,200,0,.5));}
.grade-A{color:#00ff88;filter:drop-shadow(0 0 20px #00ff88) drop-shadow(0 0 40px rgba(0,255,100,.4));}
.grade-B{color:#00e5ff;filter:drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 40px rgba(0,200,255,.4));}
.grade-C{color:#ff9a00;filter:drop-shadow(0 0 20px #ff9a00);}
.grade-D{color:#ff4444;filter:drop-shadow(0 0 20px #ff4444);}

.grade-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:4px;}

/* ── ACCURACY ── */
.accuracy-wrap{width:min(280px,80vw);margin-bottom:22px;opacity:0;animation:fadeUp .5s ease 1.4s forwards;}
.acc-head{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,200,100,.35);margin-bottom:8px;}
.acc-track{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;position:relative;
  clip-path:polygon(3px 0%,calc(100% - 3px) 0%,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0% calc(100% - 3px),0% 3px);}
.acc-fill{height:100%;width:0%;background:linear-gradient(90deg,#cc2200,#ff8800,#ffcc00,#00ff88);box-shadow:0 0 10px rgba(255,150,0,.6);border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1) 1.6s;}
.acc-fill::after{content:'';position:absolute;top:0;left:0;height:100%;width:50%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:accShim 2.5s ease infinite 3s;}
@keyframes accShim{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}

/* ══════════════════════════════════════════
   STAT CARDS
══════════════════════════════════════════ */
.stats-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  width:100%;max-width:560px;margin-bottom:22px;
}
@media(max-width:520px){.stats-grid{grid-template-columns:repeat(3,1fr);}}

.stat-card{
  position:relative;background:linear-gradient(160deg,#120900,#0a0500,#0d0208);
  border:1px solid rgba(255,100,0,.18);padding:14px 8px;text-align:center;overflow:hidden;
  clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px);
  opacity:0;transform:translateY(16px);
}
.stat-card:nth-child(1){animation:cardIn .4s ease 1.5s forwards;}
.stat-card:nth-child(2){animation:cardIn .4s ease 1.6s forwards;}
.stat-card:nth-child(3){animation:cardIn .4s ease 1.7s forwards;}
.stat-card:nth-child(4){animation:cardIn .4s ease 1.8s forwards;}
.stat-card:nth-child(5){animation:cardIn .4s ease 1.9s forwards;}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

.stat-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,150,50,.3),transparent);}
.stat-card:hover{border-color:rgba(255,150,0,.4);transform:translateY(-4px)!important;box-shadow:0 0 25px rgba(150,50,0,.3);}

.stat-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(22px,3.5vw,30px);display:block;line-height:1;color:#ffcc88;text-shadow:0 0 10px rgba(255,180,50,.4);}
.stat-num.green{color:#00ff88;text-shadow:0 0 12px rgba(0,255,100,.5);}
.stat-num.red  {color:#ff4455;text-shadow:0 0 12px rgba(255,50,50,.5);}
.stat-num.cyan {color:#00e5ff;text-shadow:0 0 12px rgba(0,200,255,.5);}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.28);margin-top:4px;}

/* ══════════════════════════════════════════
   COINS EARNED
══════════════════════════════════════════ */
.coins-card{
  position:relative;display:flex;align-items:center;gap:20px;
  background:linear-gradient(135deg,rgba(80,35,0,.55),rgba(40,12,0,.7));
  border:1px solid rgba(255,150,0,.3);
  padding:18px 32px;margin-bottom:24px;overflow:hidden;
  clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);
  box-shadow:0 0 50px rgba(180,80,0,.2),inset 0 1px 0 rgba(255,200,80,.1);
  opacity:0;animation:fadeUp .6s ease 2s forwards;
}
.coins-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#ffcc00,transparent);animation:topGlow 3s ease infinite;}
@keyframes topGlow{0%,100%{opacity:.4}50%{opacity:1}}
.coins-card::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,200,0,.07),transparent);animation:coinShim 4s ease infinite 3s;}
@keyframes coinShim{0%{left:-100%}50%,100%{left:150%}}

.coin-emoji{font-size:44px;filter:drop-shadow(0 0 15px rgba(255,180,0,.8));animation:coinSpin 1.2s ease .3s;}
@keyframes coinSpin{0%{transform:rotateY(0) scale(1)}50%{transform:rotateY(180deg) scale(1.25)}100%{transform:rotateY(360deg) scale(1)}}

.coins-earned-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:44px;color:#ffdd88;line-height:1;text-shadow:0 0 20px rgba(255,180,0,.6);}
.coins-earned-prefix{font-size:28px;color:#ff9a00;}
.coins-earned-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,200,100,.3);margin-top:3px;}
.coins-total-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,.22);margin-top:5px;letter-spacing:1px;}
.coins-total-num{color:#ff9a00;font-weight:700;}

/* ══════════════════════════════════════════
   ACTION BUTTONS
══════════════════════════════════════════ */
.action-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .5s ease 2.2s forwards;}

.forge-btn{
  position:relative;height:54px;min-width:140px;border:none;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:5px;text-transform:uppercase;
  overflow:hidden;transition:transform .12s,filter .15s;
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  display:flex;align-items:center;justify-content:center;padding:0 20px;
}
.forge-btn:hover{transform:scale(1.04);filter:brightness(1.2);}
.forge-btn:active{transform:scale(.96);}
.forge-btn::before,.forge-btn::after{content:'';position:absolute;width:8px;height:8px;border-color:rgba(255,255,255,.35);border-style:solid;transition:width .2s,height .2s;}
.forge-btn::before{top:3px;left:3px;border-width:1.5px 0 0 1.5px;}
.forge-btn::after{bottom:3px;right:3px;border-width:0 1.5px 1.5px 0;}
.forge-btn:hover::before,.forge-btn:hover::after{width:14px;height:14px;}

.forge-btn.primary{background:linear-gradient(135deg,#2a0800,#6a1800,#2a0800);background-size:200%;color:#ffcc88;box-shadow:0 0 0 1px rgba(200,60,0,.5),0 0 30px rgba(180,40,0,.3);animation:bgPulse 4s ease infinite;}
@keyframes bgPulse{0%,100%{background-position:0%}50%{background-position:100%}}
.forge-btn.primary::after{border-color:rgba(255,180,80,.35);}
.forge-btn.primary:hover{box-shadow:0 0 0 1px rgba(255,150,0,.8),0 0 50px rgba(255,80,0,.45);}

.forge-btn.secondary{background:transparent;color:rgba(255,220,150,.55);box-shadow:0 0 0 1px rgba(255,150,0,.25);}
.forge-btn.secondary:hover{color:rgba(255,220,150,.9);box-shadow:0 0 0 1px rgba(255,180,0,.6),0 0 20px rgba(200,100,0,.2);}

.forge-btn.ghost{background:rgba(255,255,255,.03);color:rgba(255,255,255,.35);box-shadow:0 0 0 1px rgba(255,255,255,.08);}
.forge-btn.ghost:hover{color:rgba(255,220,150,.7);box-shadow:0 0 0 1px rgba(255,200,100,.2);}

/* Fire sweep */
.forge-btn.primary .sweep{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,180,50,.2),transparent);animation:btnSwp 3s ease infinite 3.5s;}
@keyframes btnSwp{0%{left:-100%}50%,100%{left:150%}}

/* ══════════════════════════════════════════
   WIN-SPECIFIC: confetti / gold rain
   LOSE-SPECIFIC: blood drip
══════════════════════════════════════════ */
#confetti-canvas{position:fixed;inset:0;z-index:3;pointer-events:none;}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;
  background:rgba(10,3,0,.95);border:1px solid rgba(255,100,0,.4);padding:10px 24px;
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:#ffcc88;
  opacity:0;transition:opacity .3s;pointer-events:none;
  clip-path:polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="cursor" id="cursor"><div class="cursor-outer"></div><div class="cursor-inner"></div></div>

<canvas id="bg-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div class="vignette"></div>
<div class="scan"></div>
<div id="toast"></div>

<div class="page">

  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title title-win" id="result-title">VICTORY!</div>
  <div class="result-subtitle" id="result-subtitle">ENEMY DEFEATED</div>
  <div class="result-rule" id="result-rule"></div>

  <!-- GRADE -->
  <div class="grade-wrap">
    <div class="grade-ring"></div>
    <div class="grade-ring"></div>
    <div class="grade-badge grade-S" id="grade-badge">S</div>
    <div class="grade-label">BATTLE GRADE</div>
  </div>

  <!-- ACCURACY -->
  <div class="accuracy-wrap">
    <div class="acc-head"><span>ACCURACY</span><span id="acc-pct">0%</span></div>
    <div class="acc-track"><div class="acc-fill" id="acc-fill"></div></div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-num green" id="result-correct">0</span>
      <div class="stat-lbl">CORRECT</div>
    </div>
    <div class="stat-card">
      <span class="stat-num red" id="result-wrong">0</span>
      <div class="stat-lbl">WRONG</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="result-hp-left">0</span>
      <div class="stat-lbl">HP LEFT</div>
    </div>
    <div class="stat-card">
      <span class="stat-num cyan" id="result-combo">0</span>
      <div class="stat-lbl">MAX COMBO</div>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="result-time">0s</span>
      <div class="stat-lbl">DURATION</div>
    </div>
  </div>

  <!-- COINS -->
  <div class="coins-card">
    <span class="coin-emoji">🪙</span>
    <div>
      <div>
        <span class="coins-earned-prefix">+</span>
        <span class="coins-earned-num" id="coins-earned-num">0</span>
      </div>
      <div class="coins-earned-lbl">COINS EARNED</div>
      <div class="coins-total-lbl">Vault balance: <span class="coins-total-num" id="coins-total-num">0</span> 🪙</div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="action-row">
    <button class="forge-btn primary" onclick="window.location.href='shop.html'">
      <div class="sweep"></div>
      <span style="position:relative;z-index:1">🏪 &nbsp; VISIT SHOP</span>
    </button>
    <button class="forge-btn secondary" onclick="window.location.href='difficulty.html'">
      <span style="position:relative;z-index:1">⚔ &nbsp; PLAY AGAIN</span>
    </button>
    <button class="forge-btn ghost" onclick="window.location.href='menu.html'">
      <span style="position:relative;z-index:1">🏠 &nbsp; MAIN MENU</span>
    </button>
  </div>

</div>

<script src="../shared/eventbus.js"></script>
<script src="../shared/state.js"></script>
<script src="../shared/api.js"></script>
<script src="../shared/sfx.js"></script>
<script src="../shared/navigation.js"></script>
<script src="../shared/auth.js"></script>
<script src="../shared/ui.js"></script>
<script src="../shared/main.js"></script>
<script>
if(!State.isLoggedIn()) window.location.href='auth.html';

var resultData=null;
try{resultData=JSON.parse(sessionStorage.getItem('pw_result'));}catch(e){}
if(!resultData) window.location.href='menu.html';

var won   = resultData.won;
var stats = resultData.stats || {};

/* ── CURSOR ── */
var cur=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
document.addEventListener('mousedown',function(){cur.classList.add('cl');});
document.addEventListener('mouseup',function(){cur.classList.remove('cl');});

/* ── POPULATE ── */
document.getElementById('result-icon').textContent = won ? '🏆' : '💀';

var titleEl = document.getElementById('result-title');
titleEl.textContent = won ? 'VICTORY!' : 'DEFEAT...';
titleEl.className = 'result-title ' + (won ? 'title-win' : 'title-lose');

document.getElementById('result-subtitle').textContent = won ? 'ENEMY DEFEATED' : 'YOU FELL IN BATTLE';

/* Stats */
document.getElementById('result-correct').textContent = stats.correct  || 0;
document.getElementById('result-wrong').textContent   = stats.wrong    || 0;
document.getElementById('result-hp-left').textContent = (stats.playerHP >= 0 ? stats.playerHP : 0);
document.getElementById('result-combo').textContent   = stats.maxCombo || 0;
document.getElementById('result-time').textContent    = (stats.duration || 0) + 's';

/* Grade + accuracy */
var total    = (stats.correct||0)+(stats.wrong||0);
var accuracy = total>0 ? Math.round((stats.correct/total)*100) : 0;
var grade    = accuracy>=95?'S':accuracy>=80?'A':accuracy>=65?'B':accuracy>=50?'C':'D';
var gradeEl  = document.getElementById('grade-badge');
gradeEl.textContent = grade;
gradeEl.className   = 'grade-badge grade-'+grade;
document.getElementById('acc-pct').textContent = accuracy+'%';
setTimeout(function(){document.getElementById('acc-fill').style.width=accuracy+'%';},300);

/* Coins */
document.getElementById('coins-earned-num').textContent = stats.coinsEarned || 0;
document.getElementById('coins-total-num').textContent  = stats.totalCoins  || 0;

/* Sound */
setTimeout(function(){EventBus.emit('sfx:play',{name:won?'victory':'defeat'});},200);

sessionStorage.removeItem('pw_result');

/* ══════════════════════════════════════════
   FIRE / SKULL BG CANVAS
══════════════════════════════════════════ */
(function(){
  var C=document.getElementById('bg-canvas'),ctx=C.getContext('2d'),W,H,pts=[],t=0;
  function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
  addEventListener('resize',resize);resize();

  /* Fire colors: gold for win, red/dark for loss */
  var hueBase = won ? 30 : 0;
  for(var i=0;i<140;i++) pts.push({x:Math.random()*W,y:H+Math.random()*180,r:Math.random()*2.8+.4,vx:(Math.random()-.5)*.45,vy:-(Math.random()*1.3+.3),life:Math.random(),max:Math.random()*.65+.3,hue:hueBase+Math.random()*25});

  function draw(){
    ctx.clearRect(0,0,W,H);t++;
    var cx=W/2;
    var bg=won
      ? ctx.createRadialGradient(cx,H,0,cx,H*.4,H)
      : ctx.createRadialGradient(cx,H*.5,0,cx,H*.5,H*.8);
    if(won){bg.addColorStop(0,'rgba(80,30,0,.32)');bg.addColorStop(1,'rgba(0,0,0,0)');}
    else{bg.addColorStop(0,'rgba(80,0,0,.28)');bg.addColorStop(.5,'rgba(40,0,0,.15)');bg.addColorStop(1,'rgba(0,0,0,0)');}
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    pts.forEach(function(p){
      p.life+=.011;if(p.life>p.max){p.y=H+20;p.x=Math.random()*W;p.life=0;p.max=Math.random()*.65+.3;}
      var pg=p.life/p.max,a=pg<.2?pg/.2:pg>.7?(1-pg)/.3:1;a*=.75;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1-pg*.5),0,Math.PI*2);
      ctx.fillStyle='hsla('+(p.hue+pg*15)+','+(85-pg*25)+'%,'+(65-pg*35)+'%,'+a+')';ctx.fill();
      p.x+=p.vx+Math.sin(t*.02+p.y*.01)*.3;p.y+=p.vy;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════
   WIN: GOLD CONFETTI RAIN
   LOSE: FLOATING DARK EMBERS
══════════════════════════════════════════ */
(function(){
  var C=document.getElementById('confetti-canvas'),ctx=C.getContext('2d'),W,H,pieces=[],t=0;
  function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
  addEventListener('resize',resize);resize();

  if(won){
    /* Gold coin confetti */
    var confettiColors=['#ffd700','#ffaa00','#ff8800','#ffeeaa','#ffffff','#ff6600'];
    for(var i=0;i<80;i++){
      pieces.push({
        x:Math.random()*W, y:-Math.random()*H,
        w:Math.random()*10+4, h:Math.random()*6+3,
        vy:Math.random()*2+1, vx:(Math.random()-.5)*1.5,
        rot:Math.random()*Math.PI*2, rotV:(Math.random()-.5)*.15,
        color:confettiColors[Math.floor(Math.random()*confettiColors.length)],
        alpha:Math.random()*.6+.4, type:Math.random()>.5?'rect':'circle'
      });
    }
  } else {
    /* Dark ash falling */
    for(var i=0;i<60;i++){
      pieces.push({
        x:Math.random()*W, y:-Math.random()*H,
        r:Math.random()*3+1,
        vy:Math.random()*.8+.3, vx:(Math.random()-.5)*.5,
        alpha:Math.random()*.25+.05,
        color:Math.random()>.5?'80,20,20':'40,40,40'
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);t++;
    pieces.forEach(function(p){
      p.y+=p.vy; p.x+=p.vx+Math.sin(t*.01+p.x*.005)*.3;
      if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}

      if(won){
        p.rot+=p.rotV;
        ctx.save();
        ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.color;
        if(p.type==='circle'){ctx.beginPath();ctx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);ctx.fill();}
        else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
        /* Glow on gold pieces */
        ctx.shadowColor=p.color;ctx.shadowBlur=6;
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba('+p.color+','+p.alpha+')';ctx.fill();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ══════════════════════════════════════════
   LIGHTNING on WIN (celebration strikes)
══════════════════════════════════════════ */
if(won){
  (function(){
    var C=document.getElementById('fx-canvas'),ctx=C.getContext('2d'),W,H,bolts=[],t=0;
    function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
    addEventListener('resize',resize);resize();

    function makeBolt(x1,y1,x2,y2,d){
      if(d<=0)return[{x:x1,y:y1},{x:x2,y:y2}];
      var mx=(x1+x2)/2+(Math.random()-.5)*(Math.abs(x2-x1)+Math.abs(y2-y1))*.4;
      var my=(y1+y2)/2+(Math.random()-.5)*(Math.abs(x2-x1)+Math.abs(y2-y1))*.4;
      return makeBolt(x1,y1,mx,my,d-1).concat(makeBolt(mx,my,x2,y2,d-1));
    }

    function strike(){
      var x=W*.1+Math.random()*W*.8;
      bolts.push({pts:makeBolt(x,-20,W*.2+Math.random()*W*.6,H*.5,5),life:1,decay:.1+Math.random()*.06});
      setTimeout(strike,4000+Math.random()*4000);
    }
    setTimeout(strike,1500);

    function draw(){
      ctx.clearRect(0,0,W,H);t++;
      bolts=bolts.filter(function(b){
        b.life-=b.decay;if(b.life<=0)return false;
        ctx.beginPath();ctx.moveTo(b.pts[0].x,b.pts[0].y);
        for(var i=1;i<b.pts.length;i++)ctx.lineTo(b.pts[i].x,b.pts[i].y);
        ctx.strokeStyle='rgba(255,220,100,'+b.life*.25+')';ctx.lineWidth=8;ctx.stroke();
        ctx.strokeStyle='rgba(255,240,180,'+b.life*.6+')';ctx.lineWidth=2;ctx.stroke();
        ctx.strokeStyle='rgba(255,255,255,'+b.life*.8+')';ctx.lineWidth=.8;ctx.stroke();
        return true;
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Warriors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; cursor: none; }

/* Custom cursor */
.cursor { position: fixed; width: 20px; height: 20px; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
.cursor-inner { width: 6px; height: 6px; background: #ff9a00; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 10px #ff9a00, 0 0 20px #ff6600; }
.cursor-outer { width: 20px; height: 20px; border: 1px solid rgba(255,154,0,.5); border-radius: 50%; position: absolute; top: 0; left: 0; animation: cursorPulse 2s ease infinite; }
@keyframes cursorPulse { 0%,100% { transform: scale(1); opacity: .5 } 50% { transform: scale(1.3); opacity: .2 } }
.cursor.clicking .cursor-inner { transform: translate(-50%,-50%) scale(2); background: #fff; }

/* Background canvas */
#bg-canvas { position: fixed; inset: 0; z-index: 0; }

/* Atmosphere gradient overlays */
.atm-top   { position: fixed; top: 0; left: 0; right: 0; height: 35%; background: linear-gradient(180deg,rgba(0,0,0,.95) 0%,transparent 100%); z-index: 1; pointer-events: none; }
.atm-bot   { position: fixed; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(0deg,rgba(0,0,0,.97) 0%,rgba(10,2,0,.4) 60%,transparent 100%); z-index: 1; pointer-events: none; }
.atm-left  { position: fixed; top: 0; left: 0; bottom: 0; width: 30%; background: linear-gradient(90deg,rgba(0,0,0,.8) 0%,transparent 100%); z-index: 1; pointer-events: none; }
.atm-right { position: fixed; top: 0; right: 0; bottom: 0; width: 30%; background: linear-gradient(270deg,rgba(0,0,0,.8) 0%,transparent 100%); z-index: 1; pointer-events: none; }

/* Molten crack overlay */
.cracks { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: .6; }
.cracks svg { width: 100%; height: 100%; }

/* Scanline effect */
.scan { position: fixed; inset: 0; z-index: 3; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px); animation: scanScroll 8s linear infinite; }
@keyframes scanScroll { from { background-position: 0 0 } to { background-position: 0 100px } }

/* Vignette */
.vig { position: fixed; inset: 0; z-index: 3; pointer-events: none; background: radial-gradient(ellipse 75% 75% at 50% 50%,transparent 30%,rgba(0,0,0,.85) 100%); }

/* Main stage */
.stage { position: relative; z-index: 10; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* Title */
.title-wrap { position: relative; text-align: center; margin-bottom: 8px; }
.rune-row { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 6px; color: rgba(255,120,0,.35); margin-bottom: 10px; opacity: 0; animation: fadeIn .6s ease .2s forwards; }
@keyframes fadeIn { to { opacity: 1; } }

.title-puzzle { font-family: 'Uncial Antiqua', serif; font-size: clamp(38px,7.5vw,96px); letter-spacing: 16px; color: #1a0800; -webkit-text-stroke: 1px rgba(255,100,0,.4); display: block; line-height: 1; opacity: 0; transform: scaleY(1.5) translateY(-30px); animation: titleCrash .7s cubic-bezier(.22,1,.36,1) .4s forwards; }
@keyframes titleCrash { to { opacity: 1; transform: scaleY(1) translateY(0); } }

.title-puzzle-filled { position: absolute; top: 0; left: 0; right: 0; font-family: 'Uncial Antiqua', serif; font-size: clamp(38px,7.5vw,96px); letter-spacing: 16px; background: linear-gradient(180deg,#fff8e0 0%,#ffcc44 20%,#ff8800 50%,#cc4400 75%,#660000 100%); background-size: 100% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(255,100,0,.8)) drop-shadow(0 0 40px rgba(255,50,0,.4)); clip-path: inset(100% 0 0 0); animation: moltenReveal 1.2s cubic-bezier(.22,1,.36,1) .6s forwards, moltenFlow 4s ease infinite 1.8s; line-height: 1; }
@keyframes moltenReveal { to { clip-path: inset(0% 0 0 0); } }
@keyframes moltenFlow { 0%,100% { background-position: 0% 0% } 50% { background-position: 0% 100% } }

.title-warriors { font-family: 'Uncial Antiqua', serif; font-size: clamp(38px,7.5vw,96px); letter-spacing: 10px; background: linear-gradient(180deg,#e8e8e8 0%,#aaaaaa 30%,#888 50%,#444 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(255,255,255,.2)); display: block; line-height: 1.1; opacity: 0; transform: translateY(20px); animation: slideUp .8s cubic-bezier(.16,1,.3,1) 1s forwards; }
@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

/* Decorative fire line under title */
.fire-rule { position: relative; height: 3px; margin: 14px auto 0; width: 0%; border-radius: 2px; background: linear-gradient(90deg,transparent,#ff6600,#ffaa00,#ff6600,transparent); box-shadow: 0 0 15px #ff6600, 0 0 30px rgba(255,80,0,.4); animation: fireRuleExpand .8s ease 1.1s forwards; }
@keyframes fireRuleExpand { to { width: 85%; } }

.tagline { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 8px; color: rgba(255,255,255,.22); margin-top: 14px; opacity: 0; animation: fadeIn .6s ease 1.3s forwards; }

/* Hero emblem */
.hero-zone { position: relative; margin: 28px 0 32px; opacity: 0; transform: scale(.1) rotate(-180deg); animation: heroSpin .9s cubic-bezier(.34,1.56,.64,1) .8s forwards; }
@keyframes heroSpin { to { opacity: 1; transform: scale(1) rotate(0deg); } }
.hero-emblem { width: 130px; height: 130px; position: relative; display: flex; align-items: center; justify-content: center; }
.hero-emoji { font-size: 72px; position: relative; z-index: 2; filter: drop-shadow(0 0 20px rgba(255,120,0,.9)) drop-shadow(0 0 40px rgba(255,50,0,.5)); animation: heroGlow 3s ease-in-out infinite 1.7s; }
@keyframes heroGlow { 0%,100% { filter: drop-shadow(0 0 20px rgba(255,120,0,.9)) drop-shadow(0 0 40px rgba(255,50,0,.5)) } 50% { filter: drop-shadow(0 0 35px rgba(255,200,50,1)) drop-shadow(0 0 70px rgba(255,100,0,.7)) } }

/* Orbit rings around emblem */
.orbit { position: absolute; border-radius: 50%; border: 1px solid; animation: orbitSpin linear infinite; }
.orbit1 { inset: -15px; border-color: rgba(255,120,0,.3); animation-duration: 12s; }
.orbit2 { inset: -28px; border-color: rgba(255,200,50,.15); animation-duration: 20s; animation-direction: reverse; }
.orbit3 { inset: -44px; border-color: rgba(255,80,0,.08); animation-duration: 30s; }
@keyframes orbitSpin { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
.orbit::before { content: '⬥'; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); font-size: 8px; color: rgba(255,150,0,.7); }

/* Pulse rings */
.pulse-ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px solid; transform: translate(-50%,-50%); pointer-events: none; animation: pulseOut 2.5s ease-out infinite; }
.pulse-ring:nth-child(1) { width: 130px; height: 130px; border-color: rgba(255,100,0,.4); }
.pulse-ring:nth-child(2) { width: 130px; height: 130px; border-color: rgba(255,180,0,.25); animation-delay: .8s; }
.pulse-ring:nth-child(3) { width: 130px; height: 130px; border-color: rgba(255,60,0,.15); animation-delay: 1.6s; }
@keyframes pulseOut { 0% { transform: translate(-50%,-50%) scale(1); opacity: .8 } 100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0 } }

/* Buttons */
.btn-row { display: flex; flex-direction: column; gap: 10px; width: min(320px,86vw); opacity: 0; animation: fadeIn .6s ease 1.4s forwards; }
.forge-btn { position: relative; height: 58px; border: none; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 5px; text-transform: uppercase; overflow: hidden; transition: transform .12s; clip-path: polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px); }
.forge-btn:hover  { transform: scale(1.04); }
.forge-btn:active { transform: scale(.96); }

.forge-btn.primary { background: linear-gradient(135deg,#1a0500 0%,#4a1200 30%,#8a2800 60%,#4a1200 100%); background-size: 200%; color: #ffdd88; box-shadow: 0 0 0 1px rgba(255,100,0,.5), 0 0 40px rgba(200,50,0,.35), inset 0 1px 0 rgba(255,180,60,.2); animation: btnBgShift 4s ease infinite; }
@keyframes btnBgShift { 0%,100% { background-position: 0% } 50% { background-position: 100% } }
.forge-btn.primary:hover { box-shadow: 0 0 0 1px rgba(255,150,0,.8), 0 0 60px rgba(255,80,0,.5), inset 0 1px 0 rgba(255,220,80,.3); }
.forge-btn.primary::after  { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,transparent 0%,#ffaa00 30%,#ff6600 50%,#ffaa00 70%,transparent 100%); animation: lavaDrip 3s ease infinite 2s; }
@keyframes lavaDrip { 0% { opacity: 0; transform: scaleX(.3) } 30% { opacity: 1 } 100% { opacity: 0; transform: scaleX(1.2) } }
.forge-btn.primary::before { content: ''; position: absolute; bottom: 0; left: -100%; width: 60%; height: 1px; background: linear-gradient(90deg,transparent,rgba(255,150,0,.8),transparent); animation: emberLine 3s ease-out infinite 1s; }
@keyframes emberLine { to { left: 150%; } }

.forge-btn.silver { background: linear-gradient(135deg,#0e0e12 0%,#1a1a22 50%,#0e0e12 100%); color: rgba(255,255,255,.55); box-shadow: 0 0 0 1px rgba(255,255,255,.12); }
.forge-btn.silver:hover { color: rgba(255,255,255,.9); box-shadow: 0 0 0 1px rgba(255,255,255,.3), 0 0 20px rgba(255,255,255,.08); }
.btn-text { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 10px; height: 100%; }

/* Mute hint — shown briefly if autoplay is blocked */
.mute-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: rgba(255,180,80,.5); pointer-events: none; opacity: 0; transition: opacity .5s; }
.mute-hint.show { opacity: 1; }

/* Ember particle canvas */
.side-embers { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

/* Page transition flash */
.flash { position: fixed; inset: 0; z-index: 999; background: rgba(255,100,0,.2); opacity: 0; pointer-events: none; }
.flash.go { animation: flashFade .5s ease forwards; }
@keyframes flashFade { 0% { opacity: 1 } 100% { opacity: 0 } }

/* Toast notification */
#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(10,3,0,.95); border: 1px solid rgba(255,100,0,.4); border-radius: 4px; padding: 10px 24px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #ffcc88; opacity: 0; transition: opacity .3s; pointer-events: none; clip-path: polygon(6px 0%,calc(100% - 6px) 0%,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0% calc(100% - 6px),0% 6px); }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="cursor" id="cursor"><div class="cursor-outer"></div><div class="cursor-inner"></div></div>

<canvas id="bg-canvas"></canvas>

<div class="atm-top"></div>
<div class="atm-bot"></div>
<div class="atm-left"></div>
<div class="atm-right"></div>

<div class="cracks">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <linearGradient id="lava" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#ff8800" stop-opacity="0"><animate attributeName="stop-opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/></stop>
        <stop offset="50%"  stop-color="#ff4400" stop-opacity="0.6"><animate attributeName="stop-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></stop>
        <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"><animate attributeName="stop-opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/></stop>
      </linearGradient>
    </defs>
    <g filter="url(#glow)" stroke="url(#lava)" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M720 900 L690 820 L660 780 L680 730 L640 680"><animate attributeName="stroke-width" values="1;2.5;1" dur="3s" repeatCount="indefinite"/></path>
      <path d="M720 900 L750 810 L780 760 L760 700 L800 650"><animate attributeName="stroke-width" values="1;2;1" dur="4s" repeatCount="indefinite" begin="0.5s"/></path>
      <path d="M690 820 L620 800 L560 820 L500 790"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="5s" repeatCount="indefinite"/></path>
      <path d="M750 810 L820 830 L880 800 L940 820"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="4.5s" repeatCount="indefinite" begin="1s"/></path>
      <path d="M640 680 L600 640 L580 590 L600 540"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="6s" repeatCount="indefinite" begin="0.3s"/></path>
      <path d="M800 650 L840 600 L860 550 L840 490"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="5.5s" repeatCount="indefinite" begin="0.8s"/></path>
      <path d="M0 600 L80 580 L120 550 L100 510 L140 470"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="7s" repeatCount="indefinite"/></path>
      <path d="M0 750 L100 720 L150 740 L180 700"><animate attributeName="stroke-width" values="0.5;2;0.5" dur="6s" repeatCount="indefinite" begin="1.5s"/></path>
      <path d="M1440 650 L1360 630 L1320 600 L1340 560"><animate attributeName="stroke-width" values="0.5;1.5;0.5" dur="7s" repeatCount="indefinite" begin="2s"/></path>
      <path d="M1440 800 L1350 770 L1300 790 L1260 750"><animate attributeName="stroke-width" values="0.5;2;0.5" dur="6s" repeatCount="indefinite" begin="0.7s"/></path>
    </g>
    <g filter="url(#glow)" fill="#ff8800">
      <circle cx="720" cy="900" r="4" opacity="0.8"><animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="660" cy="780" r="3" opacity="0.6"><animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite" begin="0.5s"/></circle>
      <circle cx="760" cy="760" r="3" opacity="0.6"><animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite" begin="1s"/></circle>
      <circle cx="640" cy="680" r="2" opacity="0.5"><animate attributeName="r" values="1.5;3;1.5" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="800" cy="650" r="2" opacity="0.5"><animate attributeName="r" values="1.5;3;1.5" dur="3.5s" repeatCount="indefinite" begin="0.8s"/></circle>
    </g>
  </svg>
</div>

<div class="scan"></div>
<div class="vig"></div>
<div class="flash" id="flash"></div>
<div id="toast"></div>
<canvas class="side-embers" id="ember-canvas"></canvas>
<div class="mute-hint" id="mute-hint">▶ CLICK ANYWHERE TO ENABLE AUDIO</div>

<div class="stage">
  <div class="title-wrap">
    <div class="rune-row">⚔ ⟡ ᚱᚢᚾᛖ ᚹᚨᚱ ⟡ ⚔</div>
    <div style="position:relative;display:inline-block;">
      <span class="title-puzzle">PUZZLE</span>
      <span class="title-puzzle-filled">PUZZLE</span>
    </div>
    <span class="title-warriors">WARRIORS</span>
    <div class="fire-rule"></div>
    <div class="tagline">SOLVE ✦ FIGHT ✦ CONQUER</div>
  </div>

  <div class="hero-zone">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="hero-emblem">
      <div class="orbit orbit1"></div>
      <div class="orbit orbit2"></div>
      <div class="orbit orbit3"></div>
      <span class="hero-emoji">⚔️</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="forge-btn primary" id="btn-enter">
      <div class="btn-text">▶ &nbsp; ENTER THE ARENA</div>
    </button>
    <button class="forge-btn silver" id="btn-howto">
      <div class="btn-text">📖 &nbsp; HOW TO PLAY</div>
    </button>
    <button class="forge-btn silver" id="btn-leaderboard">
      <div class="btn-text">🏆 &nbsp; LEADERBOARD</div>
    </button>
  </div>
</div>

<script src="shared/eventbus.js"></script>
<script src="shared/state.js"></script>
<script src="shared/api.js"></script>
<script src="shared/sfx.js"></script>
<script src="shared/navigation.js"></script>
<script src="shared/auth.js"></script>
<script src="shared/ui.js"></script>
<script src="shared/main.js"></script>

<script>
if (State.isLoggedIn()) window.location.href = 'pages/menu.html';

// ── BGM — try immediately, retry on first interaction if blocked ───
var _bgm = new Audio('shared/battle.mp3');
_bgm.loop   = true;
_bgm.volume = 0.35;

var _bgmStarted = false;
var _hint = document.getElementById('mute-hint');

function _startBgm() {
  if (_bgmStarted) return;
  _bgm.play().then(function() {
    _bgmStarted = true;
    _hint.classList.remove('show');
  }).catch(function() {
    // Autoplay blocked — show hint, wait for gesture
    _hint.classList.add('show');
  });
}

// Try on load
_startBgm();

// Retry on any interaction (covers autoplay-blocked browsers)
function _onGesture() {
  if (_bgmStarted) return;
  _bgm.play().then(function() {
    _bgmStarted = true;
    _hint.classList.remove('show');
    document.removeEventListener('click',     _onGesture);
    document.removeEventListener('keydown',   _onGesture);
    document.removeEventListener('touchstart',_onGesture);
  }).catch(function(){});
}
document.addEventListener('click',      _onGesture);
document.addEventListener('keydown',    _onGesture);
document.addEventListener('touchstart', _onGesture);

// Mute button sync
EventBus.on('sfx:toggle', function(){ _bgm.muted = !_bgm.muted; });

// Stop on navigate away
window.addEventListener('beforeunload', function(){ _bgm.pause(); });

// ── Button handlers ───────────────────────────────────
document.getElementById('btn-enter').addEventListener('click', function() {
  EventBus.emit('sfx:play', { name: 'transition' });
  _bgm.pause();
  document.getElementById('flash').classList.add('go');
  setTimeout(function() {
    window.location.href = State.isLoggedIn() ? 'pages/menu.html' : 'pages/auth.html';
  }, 380);
});

document.getElementById('btn-howto').addEventListener('click', function() {
  window.location.href = 'pages/howto.html';
});

document.getElementById('btn-leaderboard').addEventListener('click', function() {
  window.location.href = 'pages/leaderboard.html';
});

// ── Custom cursor ─────────────────────────────────────
(function () {
  var cursor = document.getElementById('cursor');
  document.addEventListener('mousemove',  function(e) { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
  document.addEventListener('mousedown',  function() { cursor.classList.add('clicking'); });
  document.addEventListener('mouseup',    function() { cursor.classList.remove('clicking'); });
})();

// ── Background canvas — fire particles + lightning ────
(function () {
  var canvas = document.getElementById('bg-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, particles = [], lightnings = [], frame = 0;

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  for (var i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * W, y: H + Math.random() * 200,
      r: Math.random() * 3 + .5,
      vx: (Math.random() - .5) * .4, vy: -(Math.random() * 1.2 + .3),
      life: Math.random(), maxLife: Math.random() * .7 + .3,
      hue: Math.random() * 30 + 10
    });
  }

  function makeLightning(x1, y1, x2, y2, depth) {
    if (depth <= 0) return [{ x: x1, y: y1 }, { x: x2, y: y2 }];
    var mx = (x1 + x2) / 2 + (Math.random() - .5) * (Math.abs(x2 - x1) + Math.abs(y2 - y1)) * .4;
    var my = (y1 + y2) / 2 + (Math.random() - .5) * (Math.abs(x2 - x1) + Math.abs(y2 - y1)) * .4;
    return makeLightning(x1, y1, mx, my, depth - 1).concat(makeLightning(mx, my, x2, y2, depth - 1));
  }

  function spawnLightning() {
    lightnings.push({
      pts:   makeLightning(W * .3 + Math.random() * W * .4, -50, W * .2 + Math.random() * W * .6, H * .6, 6),
      life:  1,
      decay: .08 + Math.random() * .05
    });
    setTimeout(spawnLightning, 3000 + Math.random() * 5000);
  }
  setTimeout(spawnLightning, 2500);

  function draw() {
    ctx.clearRect(0, 0, W, H);
    frame++;

    var bg = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, Math.max(W, H));
    bg.addColorStop(0,  'rgba(80,20,0,.25)');
    bg.addColorStop(.4, 'rgba(40,8,0,.18)');
    bg.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    var floor = ctx.createLinearGradient(0, H - 2, 0, H + 30);
    floor.addColorStop(0, 'rgba(255,80,0,.6)');
    floor.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = floor;
    ctx.fillRect(0, H - 30, W, 32);

    particles.forEach(function(p) {
      p.life += .012;
      if (p.life > p.maxLife) {
        p.y = H + Math.random() * 50; p.x = Math.random() * W;
        p.life = 0; p.maxLife = Math.random() * .7 + .3;
      }
      var prog  = p.life / p.maxLife;
      var alpha = (prog < .2 ? prog / .2 : prog > .7 ? (1 - prog) / .3 : 1) * .8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 - prog * .5), 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + (p.hue + prog * 20) + ',' + (90 - prog * 30) + '%,' + (70 - prog * 40) + '%,' + alpha + ')';
      ctx.fill();
      p.x += p.vx + Math.sin(frame * .02 + p.y * .01) * .3;
      p.y += p.vy;
    });

    lightnings = lightnings.filter(function(l) {
      l.life -= l.decay;
      if (l.life <= 0) return false;
      var a = l.life * .8;
      ctx.beginPath();
      ctx.moveTo(l.pts[0].x, l.pts[0].y);
      l.pts.forEach(function(pt) { ctx.lineTo(pt.x, pt.y); });
      ctx.strokeStyle = 'rgba(255,180,80,' + (a * .3) + ')'; ctx.lineWidth = 6; ctx.stroke();
      ctx.strokeStyle = 'rgba(255,230,160,' + a + ')';       ctx.lineWidth = 1.5; ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,' + (a * .8) + ')'; ctx.lineWidth = .8; ctx.stroke();
      return true;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Ember particle canvas ─────────────────────────────
(function () {
  var canvas = document.getElementById('ember-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, embers = [], mx = -1, my = -1;

  function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  for (var i = 0; i < 60; i++) {
    embers.push({
      x: Math.random() * W, y: H + Math.random() * H,
      vx: (Math.random() - .5) * .8, vy: -(Math.random() * 1.5 + .5),
      r: Math.random() * 2 + .5, alpha: Math.random(),
      color: Math.random() > .5 ? '255,120,30' : '255,200,60'
    });
  }

  document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });

  function draw() {
    ctx.clearRect(0, 0, W, H);
    embers.forEach(function(e) {
      e.alpha -= .004;
      if (e.alpha <= 0) { e.x = Math.random() * W; e.y = H + 10; e.alpha = .6 + Math.random() * .4; }
      if (mx >= 0) {
        var dx = e.x - mx, dy = e.y - my, d = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) { e.vx += dx / d * .05; e.vy += dy / d * .02; }
      }
      e.x += e.vx; e.y += e.vy; e.vx *= .99;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + e.color + ',' + e.alpha + ')';
      ctx.fill();
      if (e.r > 1.2 && e.alpha > .3) {
        ctx.beginPath();
        ctx.moveTo(e.x - e.r * 3, e.y); ctx.lineTo(e.x + e.r * 3, e.y);
        ctx.moveTo(e.x, e.y - e.r * 3); ctx.lineTo(e.x, e.y + e.r * 3);
        ctx.strokeStyle = 'rgba(' + e.color + ',' + (e.alpha * .5) + ')';
        ctx.lineWidth = .5; ctx.stroke();
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
